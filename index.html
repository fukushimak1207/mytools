<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #F7F8FA;
    --panel: #FFFFFF;
    --panel-2: #FBFCFD;
    --ink: #1E242B;
    --ink-soft: #566070;
    --ink-faint: #8A93A2;
    --line: #D9DEE6;
    --line-soft: #E9ECF1;
    --accent: #1F9E98;
    --accent-ink: #0E5C58;
    --accent-wash: #E4F3F1;
    --cat-lab: #1F9E98;
    --cat-study: #5B6EE1;
    --cat-life: #C98A1E;
    --shadow: 0 1px 2px rgba(20,30,45,.06), 0 6px 18px rgba(20,30,45,.06);
    --shadow-lift: 0 2px 6px rgba(20,30,45,.10), 0 14px 34px rgba(20,30,45,.12);
    --radius: 14px;
    --radius-sm: 9px;
    --font: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
    --mono: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14171C;
      --panel: #1B1F26;
      --panel-2: #21262E;
      --ink: #E6E9EE;
      --ink-soft: #A6AEBB;
      --ink-faint: #6C7684;
      --line: #2C333D;
      --line-soft: #242A32;
      --accent: #34B7B0;
      --accent-ink: #7FD8D2;
      --accent-wash: #17322F;
      --cat-lab: #34B7B0;
      --cat-study: #8592EC;
      --cat-life: #D9A441;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
      --shadow-lift: 0 2px 6px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.45);
    }
  }
  :root[data-theme="light"] {
    --bg: #F7F8FA; --panel: #FFFFFF; --panel-2: #FBFCFD; --ink: #1E242B;
    --ink-soft: #566070; --ink-faint: #8A93A2; --line: #D9DEE6; --line-soft: #E9ECF1;
    --accent: #1F9E98; --accent-ink: #0E5C58; --accent-wash: #E4F3F1;
    --cat-lab: #1F9E98; --cat-study: #5B6EE1; --cat-life: #C98A1E;
    --shadow: 0 1px 2px rgba(20,30,45,.06), 0 6px 18px rgba(20,30,45,.06);
    --shadow-lift: 0 2px 6px rgba(20,30,45,.10), 0 14px 34px rgba(20,30,45,.12);
  }
  :root[data-theme="dark"] {
    --bg: #14171C; --panel: #1B1F26; --panel-2: #21262E; --ink: #E6E9EE;
    --ink-soft: #A6AEBB; --ink-faint: #6C7684; --line: #2C333D; --line-soft: #242A32;
    --accent: #34B7B0; --accent-ink: #7FD8D2; --accent-wash: #17322F;
    --cat-lab: #34B7B0; --cat-study: #8592EC; --cat-life: #D9A441;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
    --shadow-lift: 0 2px 6px rgba(0,0,0,.5), 0 14px 34px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }
  button { font-family: inherit; }
  .app {
    display: grid;
    grid-template-columns: 248px 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow-y: auto;
  }
  .brand {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--line-soft);
    position: sticky; top: 0;
    background: var(--panel);
    z-index: 2;
  }
  .brand h1 {
    margin: 0;
    font-size: 16px;
    letter-spacing: .02em;
    display: flex; align-items: center; gap: 9px;
  }
  .brand .dot {
    width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(145deg, var(--accent), var(--accent-ink));
    display: grid; place-items: center;
    color: #fff; font-size: 12px; font-weight: 700;
    box-shadow: var(--shadow);
  }
  .brand p {
    margin: 6px 0 0; font-size: 11.5px; color: var(--ink-faint);
    letter-spacing: .03em;
  }
  .nav { padding: 10px 10px 20px; }
  .nav-group { margin-top: 6px; }
  .nav-group > .grp-head {
    width: 100%;
    display: flex; align-items: center; gap: 8px;
    background: none; border: 0; cursor: pointer;
    color: var(--ink-faint);
    font-size: 10.5px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 10px 8px 6px; text-align: left;
  }
  .grp-head .chev {
    width: 8px; height: 8px; border-right: 1.6px solid currentColor;
    border-bottom: 1.6px solid currentColor; transform: rotate(45deg);
    transition: transform .18s ease; margin-left: -2px;
  }
  .nav-group.collapsed .chev { transform: rotate(-45deg); }
  .nav-group.collapsed .grp-items { display: none; }
  .grp-items { display: flex; flex-direction: column; gap: 1px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 9px; border-radius: 8px;
    background: none; border: 0; cursor: pointer;
    color: var(--ink-soft); font-size: 13px; text-align: left; width: 100%;
    transition: background .13s ease, color .13s ease;
  }
  .nav-item:hover { background: var(--panel-2); color: var(--ink); }
  .nav-item.active { background: var(--accent-wash); color: var(--accent-ink); font-weight: 600; }
  .nav-item .ic {
    width: 20px; height: 20px; border-radius: 6px; flex: none;
    display: grid; place-items: center; font-size: 12px;
    background: var(--panel-2); border: 1px solid var(--line-soft);
  }
  .nav-item.active .ic { background: var(--panel); border-color: transparent; }
  .nav-item .badge {
    margin-left: auto; font-size: 9.5px; letter-spacing: .04em;
    color: var(--ink-faint); border: 1px solid var(--line);
    padding: 1px 6px; border-radius: 999px;
  }

  /* ---------- Main ---------- */
  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .topbar {
    height: 56px; flex: none;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    display: flex; align-items: center; gap: 12px;
    padding: 0 18px;
  }
  .crumb { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--ink-soft); min-width: 0; }
  .crumb .home { background: none; border: 0; cursor: pointer; color: var(--ink-soft); font: inherit; padding: 4px 6px; border-radius: 7px; }
  .crumb .home:hover { background: var(--panel-2); color: var(--ink); }
  .crumb .sep { color: var(--ink-faint); }
  .crumb .cur { color: var(--ink); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    height: 34px; min-width: 34px; padding: 0 10px;
    display: inline-flex; align-items: center; gap: 7px; justify-content: center;
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 9px;
    color: var(--ink-soft); cursor: pointer; font-size: 12.5px;
    transition: background .13s, color .13s, border-color .13s;
  }
  .icon-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .icon-btn.primary { background: var(--accent); border-color: transparent; color: #fff; font-weight: 600; }
  .icon-btn.primary:hover { filter: brightness(1.05); color: #fff; }
  .icon-btn:focus-visible, .nav-item:focus-visible, .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .view { flex: 1; min-height: 0; overflow: auto; }

  /* ---------- Hub ---------- */
  .hub { padding: 26px 28px 40px; max-width: 1120px; }
  .hub-lead { margin-bottom: 22px; }
  .hub-lead h2 { margin: 0 0 4px; font-size: 22px; letter-spacing: .01em; text-wrap: balance; }
  .hub-lead p { margin: 0; color: var(--ink-soft); font-size: 13.5px; }
  .cat-block { margin-top: 26px; }
  .cat-title {
    display: flex; align-items: center; gap: 9px;
    font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-faint); margin: 0 0 12px;
  }
  .cat-title .swatch { width: 9px; height: 9px; border-radius: 3px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
  .card {
    position: relative; text-align: left;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 16px; cursor: pointer;
    display: flex; flex-direction: column; gap: 10px; min-height: 132px;
    box-shadow: var(--shadow); transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    color: inherit; font: inherit;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); border-color: transparent; }
  .card[data-disabled="true"] { cursor: default; opacity: .72; }
  .card[data-disabled="true"]:hover { transform: none; box-shadow: var(--shadow); border-color: var(--line); }
  .card .glyph {
    width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
    font-size: 20px; color: #fff;
  }
  .card h3 { margin: 0; font-size: 15px; letter-spacing: .01em; display: flex; align-items: center; gap: 7px; }
  .card p { margin: 0; font-size: 12px; color: var(--ink-soft); line-height: 1.5; }
  .card .foot { margin-top: auto; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--ink-faint); }
  .pill { font-size: 10px; letter-spacing: .04em; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); }
  .pill.live { color: var(--accent-ink); border-color: color-mix(in srgb, var(--accent) 40%, transparent); background: var(--accent-wash); }
  .pill.link { color: var(--ink-soft); }
  .pill.soon { color: var(--cat-life); border-color: color-mix(in srgb, var(--cat-life) 40%, transparent); }
  .ext { margin-left: auto; color: var(--ink-faint); font-size: 13px; }

  /* ---------- Mindmap ---------- */
  .mm { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .mm-bar {
    flex: none; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 10px 16px; border-bottom: 1px solid var(--line); background: var(--panel-2);
  }
  .mm-bar select, .mm-bar .btn {
    height: 32px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink); font: inherit; font-size: 12.5px;
    padding: 0 10px; cursor: pointer;
  }
  .mm-bar .btn:hover { border-color: var(--ink-faint); }
  .mm-bar .btn.accent { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
  .mm-bar .sepv { width: 1px; height: 22px; background: var(--line); margin: 0 2px; }
  .mm-bar .spacer { margin-left: auto; }
  .mm-hint { font-size: 11px; color: var(--ink-faint); }
  .mm-canvas-wrap { position: relative; flex: 1; overflow: auto; background:
      radial-gradient(circle at 1px 1px, var(--line-soft) 1px, transparent 0);
      background-size: 22px 22px; }
  .mm-canvas { position: relative; min-width: 100%; min-height: 100%; }
  .mm-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .mm-svg path { fill: none; stroke: var(--line); stroke-width: 2; }
  .node {
    position: absolute; transform: translateY(-50%);
    background: var(--panel); border: 1.5px solid var(--line);
    border-radius: 10px; padding: 8px 12px; font-size: 13px; color: var(--ink);
    box-shadow: var(--shadow); cursor: grab; max-width: 240px; white-space: pre-wrap;
    word-break: break-word; user-select: none;
  }
  .node:hover { border-color: var(--ink-faint); }
  .node.root { background: linear-gradient(145deg, var(--accent), var(--accent-ink)); color: #fff; border-color: transparent; font-weight: 600; }
  .node.sel { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash), var(--shadow); }
  .node.editing { cursor: text; }
  .node .edit { min-width: 40px; outline: none; }
  .node-tools {
    position: absolute; top: -13px; right: -8px; display: none; gap: 3px;
  }
  .node.sel .node-tools { display: flex; }
  .node-tools button {
    width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink-soft); cursor: pointer; font-size: 12px;
    display: grid; place-items: center; box-shadow: var(--shadow); padding: 0;
  }
  .node-tools button:hover { color: var(--ink); border-color: var(--ink-faint); }
  .node-tools button.del:hover { color: #d9544e; border-color: #d9544e; }

  /* ---------- 汎用ツール ---------- */
  .tool { display: flex; flex-direction: column; height: 100%; min-height: 0; }
  .tool-body { flex: 1; overflow: auto; }
  .inline-input { font: inherit; color: inherit; background: var(--panel); border: 1px solid var(--accent); border-radius: 6px; padding: 2px 6px; outline: none; }

  /* チェックリスト */
  .cl-wrap { max-width: 720px; margin: 0 auto; padding: 20px 20px 44px; }
  .cl-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cl-bar { flex: 1; height: 8px; border-radius: 999px; background: var(--line-soft); overflow: hidden; }
  .cl-bar > i { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 999px; transition: width .25s ease; }
  .cl-count { font-size: 12.5px; color: var(--ink-soft); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .cl-list { display: flex; flex-direction: column; gap: 6px; }
  .cl-row { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
  .cl-row.done { background: var(--panel-2); }
  .cl-check { width: 20px; height: 20px; border-radius: 6px; border: 1.6px solid var(--ink-faint); flex: none; cursor: pointer; display: grid; place-items: center; color: #fff; font-size: 12px; }
  .cl-row.done .cl-check { background: var(--accent); border-color: var(--accent); }
  .cl-text { flex: 1; font-size: 13.5px; cursor: pointer; word-break: break-word; }
  .cl-row.done .cl-text { color: var(--ink-faint); text-decoration: line-through; }
  .cl-acts { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
  .cl-row:hover .cl-acts, .cl-row:focus-within .cl-acts { opacity: 1; }
  .cl-empty { text-align: center; color: var(--ink-faint); font-size: 13px; padding: 26px; }
  .mini-btn { width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--line); background: var(--panel); color: var(--ink-soft); cursor: pointer; display: grid; place-items: center; font-size: 13px; padding: 0; }
  .mini-btn:hover { color: var(--ink); border-color: var(--ink-faint); }
  .mini-btn.danger:hover { color: #d9544e; border-color: #d9544e; }

  /* メモ帳 */
  .notes-wrap { display: flex; height: 100%; min-height: 0; }
  .notes-list { width: 232px; border-right: 1px solid var(--line); overflow: auto; flex: none; background: var(--panel); }
  .note-item { padding: 11px 14px; border-bottom: 1px solid var(--line-soft); cursor: pointer; text-align: left; width: 100%; background: none; border-left: 0; border-top: 0; border-right: 0; font: inherit; color: inherit; display: block; }
  .note-item:hover { background: var(--panel-2); }
  .note-item.active { background: var(--accent-wash); }
  .note-item h4 { margin: 0 0 3px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item p { margin: 0; font-size: 11.5px; color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notes-editor { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .notes-editor textarea { flex: 1; border: 0; outline: none; resize: none; padding: 20px 22px; font-family: var(--font); font-size: 14px; line-height: 1.75; color: var(--ink); background: var(--bg); }

  /* 用語・略語メモ */
  .gl-wrap { max-width: 720px; margin: 0 auto; padding: 18px 20px 44px; }
  .gl-search { width: 100%; height: 38px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); color: var(--ink); font: inherit; font-size: 13.5px; padding: 0 12px; outline: none; margin-bottom: 14px; }
  .gl-search:focus { border-color: var(--accent); }
  .gl-list { display: flex; flex-direction: column; gap: 6px; }
  .gl-row { display: flex; gap: 12px; align-items: flex-start; padding: 11px 13px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); }
  .gl-term { font-weight: 600; font-size: 13.5px; min-width: 116px; flex: none; word-break: break-word; }
  .gl-def { flex: 1; font-size: 13px; color: var(--ink-soft); word-break: break-word; }
  .gl-acts { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; flex: none; }
  .gl-row:hover .gl-acts, .gl-row:focus-within .gl-acts { opacity: 1; }
  .gl-empty { text-align: center; color: var(--ink-faint); font-size: 13px; padding: 30px; }

  @media (max-width: 640px) {
    .notes-list { width: 144px; }
    .gl-term { min-width: 84px; }
  }

  .sheet-backdrop {
    position: fixed; inset: 0; background: rgba(15,20,28,.42);
    display: none; align-items: center; justify-content: center; z-index: 40; padding: 20px;
  }
  .sheet-backdrop.open { display: flex; }
  .sheet {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    width: min(560px, 100%); max-height: 80vh; display: flex; flex-direction: column;
    box-shadow: var(--shadow-lift); overflow: hidden;
  }
  .sheet header { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .sheet header h3 { margin: 0; font-size: 14px; }
  .sheet header .x { margin-left: auto; background: none; border: 0; cursor: pointer; color: var(--ink-faint); font-size: 18px; }
  .sheet textarea {
    flex: 1; min-height: 240px; margin: 0; border: 0; resize: none; padding: 14px 16px;
    font-family: var(--mono); font-size: 12.5px; color: var(--ink); background: var(--panel-2); line-height: 1.6;
  }
  .sheet textarea:focus { outline: none; }
  .sheet footer { padding: 12px 16px; border-top: 1px solid var(--line); display: flex; gap: 8px; }

  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg); padding: 9px 16px; border-radius: 999px;
    font-size: 12.5px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 60;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .menu-toggle { display: none; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 100vh; }
    .sidebar {
      position: fixed; z-index: 30; width: 248px; height: 100%;
      transform: translateX(-100%); transition: transform .22s ease;
      box-shadow: var(--shadow-lift);
    }
    .app.nav-open .sidebar { transform: translateX(0); }
    .menu-toggle { display: inline-flex; }
    .scrim { position: fixed; inset: 0; background: rgba(15,20,28,.4); z-index: 20; display: none; }
    .app.nav-open .scrim { display: block; }
  }
</style>

<div class="app" id="app">
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <h1><span class="dot">福</span> マイツール置き場</h1>
      <p>じぶんの道具、ぜんぶここに</p>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="メニュー">☰</button>
      <div class="crumb">
        <button class="home" id="homeBtn">ハブ</button>
        <span class="sep" id="crumbSep" hidden>›</span>
        <span class="cur" id="crumbCur" hidden></span>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="themeBtn" aria-label="テーマ切替" title="ライト / ダーク切替">◐ テーマ</button>
      </div>
    </div>
    <div class="view" id="view"></div>
  </div>
</div>

<div class="sheet-backdrop" id="sheet">
  <div class="sheet">
    <header>
      <h3 id="sheetTitle">書き出し</h3>
      <button class="x" id="sheetClose" aria-label="閉じる">×</button>
    </header>
    <textarea id="sheetText" spellcheck="false"></textarea>
    <footer>
      <button class="icon-btn primary" id="sheetCopy">コピー</button>
      <button class="icon-btn" id="sheetLoad" hidden>この内容で読み込む</button>
      <button class="icon-btn" id="sheetCancel">閉じる</button>
    </footer>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  /* ============ テーマ ============ */
  var root = document.documentElement;
  var themeBtn = document.getElementById("themeBtn");
  function currentTheme() {
    var t = root.getAttribute("data-theme");
    if (t) return t;
    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  themeBtn.addEventListener("click", function () {
    var next = currentTheme() === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem("mytools.theme", next); } catch (e) {}
  });
  try {
    var savedTheme = localStorage.getItem("mytools.theme");
    if (savedTheme) root.setAttribute("data-theme", savedTheme);

  var MM_KEY = "mytools.mindmaps";

  /* ---- レイアウト（横ツリー） ---- */
  var NODE_VGAP = 14, NODE_HGAP = 62, PAD_X = 40, PAD_Y = 30;
  function measureLeaves(node, depthInfo) {
    // 返り値: このサブツリーが占める高さ（px, 概算）
    var h = nodeHeight(node);
    if (!node.children.length) { node._h = h; return h; }
    var total = 0;
    node.children.forEach(function (c) { total += measureLeaves(c); });
    total += NODE_VGAP * (node.children.length - 1);
    node._h = Math.max(h, total);
    return node._h;
  }
  function nodeHeight() { return 40; }
  function assign(node, x, yTop) {
    // yTop: サブツリー上端。ノード自身は中央に置く
    var cx = x;
    var cy = yTop + node._h / 2;
    node._x = cx; node._y = cy;
    var childX = x + estimateWidth(node) + NODE_HGAP;
    var run = yTop;
    node.children.forEach(function (c) {
      assign(c, childX, run);
      run += c._h + NODE_VGAP;
    });
  }
  function estimateWidth(node) {
    var len = (node.text || "").length;
    return Math.min(240, Math.max(70, len * 15 + 26));
  }

  function layout() {
    var canvas = document.getElementById("mmCanvas");
    var svg = document.getElementById("mmSvg");
    if (!canvas) return;
    // 既存ノード削除（svg は残す）
    Array.prototype.slice.call(canvas.querySelectorAll(".node")).forEach(function (n) { n.remove(); });

    measureLeaves(mmData.root);
    assign(mmData.root, PAD_X, PAD_Y);

    var maxX = 0, maxY = 0;
    var edges = [];
    (function walk(node) {
      maxX = Math.max(maxX, node._x + estimateWidth(node));
      maxY = Math.max(maxY, node._y + 40);
      node.children.forEach(function (c) { edges.push([node, c]); walk(c); });
    })(mmData.root);

    canvas.style.width = (maxX + PAD_X) + "px";
    canvas.style.height = (maxY + PAD_Y) + "px";
    svg.setAttribute("width", maxX + PAD_X);
    svg.setAttribute("height", maxY + PAD_Y);

    // エッジ
    var d = "";
    edges.forEach(function (e) {
      var p = e[0], c = e[1];
      var x1 = p._x + estimateWidth(p), y1 = p._y;
      var x2 = c._x, y2 = c._y;
      var mx = (x1 + x2) / 2;
      d += "M" + x1 + "," + y1 + " C" + mx + "," + y1 + " " + mx + "," + y2 + " " + x2 + "," + y2 + " ";
    });
    svg.innerHTML = '<path d="' + d + '"></path>';

    // ノード
    (function walk(node) {
      canvas.appendChild(buildNode(node));
      node.children.forEach(walk);
    })(mmData.root);
  }

  function buildNode(node) {
    var el = document.createElement("div");
    el.className = "node" + (node.id === "root" ? " root" : "") + (node.id === mmSel ? " sel" : "");
    el.style.left = node._x + "px";
    el.style.top = node._y + "px";
    el.dataset.id = node.id;
    var span = document.createElement("span");
    span.className = "edit";
    span.textContent = node.text;
    el.appendChild(span);

    var tools = document.createElement("div");
    tools.className = "node-tools";
    tools.innerHTML =
      '<button data-act="child" title="子を追加">＋</button>' +
      (node.id === "root" ? "" : '<button class="del" data-act="del" title="削除">×</button>');
    el.appendChild(tools);

    tools.addEventListener("mousedown", function (e) { e.stopPropagation(); });
    tools.addEventListener("click", function (e) {
      var act = e.target.getAttribute("data-act");
      if (!act) return;
      e.stopPropagation();
      mmSel = node.id;
      if (act === "child") addChild();
      else if (act === "del") deleteNode();
    });

    el.addEventListener("click", function (e) {
      if (el.classList.contains("editing")) return;
      mmSel = node.id; refreshSelection();
    });
    el.addEventListener("dblclick", function (e) { e.preventDefault(); startEdit(node, el, span); });

    // ドラッグ選択（＝視覚移動はMVPでは無効。将来の自由配置用フックのみ）
    return el;
  }

  function refreshSelection() {
    var nodes = document.querySelectorAll(".node");
    nodes.forEach(function (n) { n.classList.toggle("sel", n.dataset.id === mmSel); });
  }

  function startEdit(node, el, span) {
    el.classList.add("editing");
    var input = document.createElement("input");
    input.value = node.text;
    input.style.font = "inherit";
    input.style.color = "inherit";
    input.style.background = "transparent";
    input.style.border = "0";
    input.style.outline = "none";
    input.style.width = Math.max(60, node.text.length * 15) + "px";
    span.replaceWith(input);
    input.focus(); input.select();
    var done = false;
    function commit() {
      if (done) return; done = true;
      node.text = input.value.trim() || "（無題）";
      touch(); layout(); refreshSelection();
    }
    function cancel() {
      if (done) return; done = true;
      layout(); refreshSelection();
    }
    input.addEventListener("blur", commit);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); input.removeEventListener("blur", commit); commit(); }
      else if (e.key === "Escape") { e.preventDefault(); input.removeEventListener("blur", commit); cancel(); }
      e.stopPropagation();
    });
  }

  function addChild() {
    if (!mmSel) mmSel = "root";
    var r = findNode(mmData.root, mmSel, null);
    if (!r) return;
    var n = { id: uid(), text: "新しいノード", children: [] };
    r.node.children.push(n);
    mmSel = n.id;
    touch(); layout(); autoEdit(n.id);
  }
  function addSibling() {
    if (!mmSel || mmSel === "root") { addChild(); return; }
    var r = findNode(mmData.root, mmSel, null);
    if (!r || !r.parent) return;
    var n = { id: uid(), text: "新しいノード", children: [] };
    var idx = r.parent.children.indexOf(r.node);
    r.parent.children.splice(idx + 1, 0, n);
    mmSel = n.id;
    touch(); layout(); autoEdit(n.id);
  }
  function deleteNode() {
    if (!mmSel || mmSel === "root") { toast("ルートは消せません"); return; }
    var r = findNode(mmData.root, mmSel, null);
    if (!r || !r.parent) return;
    var idx = r.parent.children.indexOf(r.node);
    r.parent.children.splice(idx, 1);
    mmSel = r.parent.id;
    touch(); layout(); refreshSelection();
  }
  function autoEdit(id) {
    var el = document.querySelector('.node[data-id="' + id + '"]');
    if (el) { var span = el.querySelector(".edit"); startEdit(findNode(mmData.root, id, null).node, el, span); }
  }

  function dupMap() {
    var copy = JSON.parse(JSON.stringify(mmData));
    var id = "map_" + Date.now().toString(36);
    copy.id = id; copy.name = mmData.name + " のコピー"; copy.updated = Date.now();
    mmState.maps[id] = copy; mmState.currentId = id; mmData = copy; mmSel = null;
    persist(mmState); refreshMapSelect(); layout();
  }
  function renameMap() {
    var name = window.prompt("マップの名前", mmData.name);
    if (name == null) return;
    mmData.name = name.trim() || mmData.name; touch(); refreshMapSelect();
  }
  function delMap() {
    if (Object.keys(mmState.maps).length <= 1) { toast("最後の1枚は消せません"); return; }
    if (!window.confirm("「" + mmData.name + "」を削除しますか？")) return;
    delete mmState.maps[mmData.id];
    mmState.currentId = Object.keys(mmState.maps)[0];
    mmData = mmState.maps[mmState.currentId]; mmSel = null;
    persist(mmState); refreshMapSelect(); layout();
  }

  /* ---- 書き出し / 読み込み ---- */
  function toMarkdown(node, depth) {
    var pad = new Array(depth + 1).join("  ");
    var line = depth === 0 ? ("# " + node.text) : (pad + "- " + node.text);
    var out = [line];
    node.children.forEach(function (c) { out.push(toMarkdown(c, depth + 1)); });
    return out.join("\n");
  }
  var sheet = document.getElementById("sheet");
  var sheetTitle = document.getElementById("sheetTitle");
  var sheetText = document.getElementById("sheetText");
  var sheetCopy = document.getElementById("sheetCopy");
  var sheetLoad = document.getElementById("sheetLoad");
  function openSheet(title, text, showLoad) {
    sheetTitle.textContent = title;
    sheetText.value = text;
    sheetLoad.hidden = !showLoad;
    sheetCopy.hidden = showLoad;
    sheet.classList.add("open");
    sheetText.focus();
  }
  function closeSheet() { sheet.classList.remove("open"); }
  document.getElementById("sheetClose").addEventListener("click", closeSheet);
  document.getElementById("sheetCancel").addEventListener("click", closeSheet);
  sheet.addEventListener("click", function (e) { if (e.target === sheet) closeSheet(); });
  sheetCopy.addEventListener("click", function () {
    sheetText.select();
    var ok = false;
    try { ok = document.execCommand("copy"); } catch (e) {}
    if (navigator.clipboard) { navigator.clipboard.writeText(sheetText.value).then(function(){}, function(){}); ok = true; }
    toast(ok ? "コピーしました" : "手動でコピーしてください");
  });
  sheetLoad.addEventListener("click", function () {
    try {
      var obj = JSON.parse(sheetText.value);
      if (!obj.root || !obj.root.children) throw new Error("形式が違います");
      var id = "map_" + Date.now().toString(36);
      obj.id = id; if (!obj.name) obj.name = "読み込んだマップ"; obj.updated = Date.now();
      mmState.maps[id] = obj; mmState.currentId = id; mmData = obj; mmSel = null;
      persist(mmState); refreshMapSelect(); layout(); closeSheet(); toast("読み込みました");
    } catch (e) { toast("JSON を読み込めませんでした"); }
  });
  function exportMarkdown() { openSheet("Markdown で書き出し", toMarkdown(mmData.root, 0), false); }
  function exportJson() { openSheet("JSON で書き出し（バックアップ）", JSON.stringify(mmData, null, 2), false); }
  function importJson() { openSheet("JSON を貼り付けて読み込み", "", true); }

  /* ---- キーボード ---- */
  document.addEventListener("keydown", function (e) {
    if (sheet.classList.contains("open")) { if (e.key === "Escape") closeSheet(); return; }
    if (!mmData || !document.querySelector(".mm")) return;
    var editing = document.querySelector(".node.editing");
    if (editing) return;
    if (e.key === "Tab") { e.preventDefault(); addChild(); }
    else if (e.key === "Enter") { e.preventDefault(); addSibling(); }
    else if (e.key === "Delete" || e.key === "Backspace") {
      if (mmSel && mmSel !== "root") { e.preventDefault(); deleteNode(); }
    } else if (e.key === "F2") {
      if (mmSel) { e.preventDefault(); autoEdit(mmSel); }
    }
  });

  /* ============ 共通ヘルパー ============ */
  function makeStore(key, seedFn) {
    var store = null;
    try { store = JSON.parse(localStorage.getItem(key)); } catch (e) {}
    if (!store || !store.items || !Object.keys(store.items).length) {
      store = seedFn();
      try { localStorage.setItem(key, JSON.stringify(store)); } catch (e) {}
    }
    return store;
  }
  function saveStore(key, store) {
    try { localStorage.setItem(key, JSON.stringify(store)); } catch (e) { toast("保存できませんでした"); }
  }
  function inlineEdit(el, initial, onCommit) {
    var input = document.createElement("input");
    input.className = "inline-input";
    input.value = initial;
    input.style.width = Math.max(80, initial.length * 15 + 20) + "px";
    el.replaceWith(input);
    input.focus(); input.select();
    var done = false;
    function fin(val) { if (done) return; done = true; onCommit(val); }
    input.addEventListener("blur", function () { fin(input.value.trim()); });
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); input.removeEventListener("blur", function () {}); fin(input.value.trim()); }
      else if (e.key === "Escape") { e.preventDefault(); fin(initial); }
      e.stopPropagation();
    });
  }
  function el(tag, cls, html) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (html != null) n.innerHTML = html;
    return n;
  }

  /* ============ チェックリスト ============ */
  var CL_KEY = "mytools.checklist";
  var clStore, clCur;
  function clSeed() {
    var id = "cl_seed";
    return { currentId: id, items: { cl_seed: { id: id, name: "連休前チェック", updated: Date.now(),
      rows: [
        { id: uid(), text: "試薬・消耗品の在庫を確認", done: false },
        { id: uid(), text: "機器の保守・電源状態を確認", done: false },
        { id: uid(), text: "当番と緊急連絡体制を共有", done: false },
        { id: uid(), text: "検体受付の停止・再開を周知", done: false },
        { id: uid(), text: "精度管理データを記録", done: false }
      ] } } };
  }
  function renderChecklist() {
    clStore = makeStore(CL_KEY, clSeed);
    if (!clStore.items[clStore.currentId]) clStore.currentId = Object.keys(clStore.items)[0];
    clCur = clStore.items[clStore.currentId];
    view.innerHTML = "";
    var wrap = el("div", "tool");
    wrap.innerHTML =
      '<div class="mm-bar">' +
        '<select id="clSel" title="リストを切り替え"></select>' +
        '<button class="btn" id="clNew">＋ 新規</button>' +
        '<button class="btn" id="clDup">複製</button>' +
        '<button class="btn" id="clRen">名前</button>' +
        '<button class="btn" id="clDel">削除</button>' +
        '<span class="sepv"></span>' +
        '<button class="btn accent" id="clAdd">＋ 項目</button>' +
        '<button class="btn" id="clReset">全部リセット</button>' +
        '<span class="spacer"></span>' +
        '<span class="mm-hint">クリック=チェック / ✎=編集</span>' +
      '</div>' +
      '<div class="tool-body"><div class="cl-wrap">' +
        '<div class="cl-progress"><div class="cl-bar"><i id="clFill"></i></div><span class="cl-count" id="clCount"></span></div>' +
        '<div class="cl-list" id="clList"></div>' +
      '</div></div>';
    view.appendChild(wrap);
    clRefreshSel();
    document.getElementById("clSel").addEventListener("change", function (e) {
      clStore.currentId = e.target.value; clCur = clStore.items[clStore.currentId];
      saveStore(CL_KEY, clStore); clRenderList();
    });
    document.getElementById("clNew").addEventListener("click", clNew);
    document.getElementById("clDup").addEventListener("click", clDup);
    document.getElementById("clRen").addEventListener("click", clRename);
    document.getElementById("clDel").addEventListener("click", clDelete);
    document.getElementById("clAdd").addEventListener("click", function () { clAddRow(); });
    document.getElementById("clReset").addEventListener("click", clResetAll);
    clRenderList();
  }
  function clRefreshSel() {
    var sel = document.getElementById("clSel"); if (!sel) return;
    sel.innerHTML = "";
    Object.keys(clStore.items).forEach(function (k) {
      var o = document.createElement("option"); o.value = k; o.textContent = clStore.items[k].name;
      if (k === clStore.currentId) o.selected = true; sel.appendChild(o);
    });
  }
  function clSave() { clCur.updated = Date.now(); saveStore(CL_KEY, clStore); }
  function clRenderList() {
    var list = document.getElementById("clList"); if (!list) return;
    list.innerHTML = "";
    if (!clCur.rows.length) {
      list.appendChild(el("div", "cl-empty", "項目がありません。「＋ 項目」で追加してください。"));
    }
    clCur.rows.forEach(function (row) {
      var r = el("div", "cl-row" + (row.done ? " done" : ""));
      var chk = el("div", "cl-check", row.done ? "✓" : "");
      chk.setAttribute("role", "checkbox");
      chk.setAttribute("tabindex", "0");
      chk.setAttribute("aria-checked", row.done ? "true" : "false");
      var txt = el("span", "cl-text", ""); txt.textContent = row.text;
      function toggle() { row.done = !row.done; clSave(); clRenderList(); }
      chk.addEventListener("click", toggle);
      chk.addEventListener("keydown", function (e) { if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(); } });
      txt.addEventListener("click", toggle);
      var acts = el("div", "cl-acts");
      var edit = el("button", "mini-btn", "✎"); edit.title = "編集";
      edit.addEventListener("click", function (e) {
        e.stopPropagation();
        inlineEdit(txt, row.text, function (v) { row.text = v || row.text; clSave(); clRenderList(); });
      });
      var del = el("button", "mini-btn danger", "×"); del.title = "削除";
      del.addEventListener("click", function (e) {
        e.stopPropagation();
        clCur.rows = clCur.rows.filter(function (x) { return x.id !== row.id; });
        clSave(); clRenderList();
      });
      acts.appendChild(edit); acts.appendChild(del);
      r.appendChild(chk); r.appendChild(txt); r.appendChild(acts);
      list.appendChild(r);
    });
    var total = clCur.rows.length, done = clCur.rows.filter(function (x) { return x.done; }).length;
    var fill = document.getElementById("clFill"), count = document.getElementById("clCount");
    if (fill) fill.style.width = total ? (done / total * 100) + "%" : "0%";
    if (count) count.textContent = done + " / " + total + " 完了";
  }
  function clAddRow() {
    var row = { id: uid(), text: "", done: false };
    clCur.rows.push(row); clSave(); clRenderList();
    var rows = document.querySelectorAll("#clList .cl-row");
    var last = rows[rows.length - 1];
    if (last) inlineEdit(last.querySelector(".cl-text"), "", function (v) {
      if (!v) { clCur.rows = clCur.rows.filter(function (x) { return x.id !== row.id; }); }
      else { row.text = v; }
      clSave(); clRenderList();
    });
  }
  function clResetAll() {
    if (!clCur.rows.length) return;
    if (!window.confirm("チェックを全部外しますか？（項目は残ります）")) return;
    clCur.rows.forEach(function (r) { r.done = false; }); clSave(); clRenderList();
  }
  function clNew() {
    var id = "cl_" + Date.now().toString(36);
    clStore.items[id] = { id: id, name: "新しいリスト", updated: Date.now(), rows: [] };
    clStore.currentId = id; clCur = clStore.items[id]; saveStore(CL_KEY, clStore);
    clRefreshSel(); clRenderList();
  }
  function clDup() {
    var copy = JSON.parse(JSON.stringify(clCur));
    var id = "cl_" + Date.now().toString(36);
    copy.id = id; copy.name = clCur.name + " のコピー"; copy.updated = Date.now();
    clStore.items[id] = copy; clStore.currentId = id; clCur = copy; saveStore(CL_KEY, clStore);
    clRefreshSel(); clRenderList();
  }
  function clRename() {
    var name = window.prompt("リストの名前", clCur.name);
    if (name == null) return; clCur.name = name.trim() || clCur.name; clSave(); clRefreshSel();
  }
  function clDelete() {
    if (Object.keys(clStore.items).length <= 1) { toast("最後の1枚は消せません"); return; }
    if (!window.confirm("「" + clCur.name + "」を削除しますか？")) return;
    delete clStore.items[clCur.id];
    clStore.currentId = Object.keys(clStore.items)[0]; clCur = clStore.items[clStore.currentId];
    saveStore(CL_KEY, clStore); clRefreshSel(); clRenderList();
  }

  /* ============ メモ帳 ============ */
  var NT_KEY = "mytools.notes";
  var ntStore, ntCur, ntTimer = null;
  function ntSeed() {
    var id = "nt_seed";
    return { currentId: id, items: { nt_seed: { id: id, updated: Date.now(),
      body: "メモ帳\n\nここに自由に書けます。入力すると自動で保存されます。\n1行目がタイトルになります。" } } };
  }
  function ntTitle(note) {
    var first = (note.body || "").split("\n")[0].trim();
    return first || "（無題）";
  }
  function renderNotes() {
    ntStore = makeStore(NT_KEY, ntSeed);
    if (!ntStore.items[ntStore.currentId]) ntStore.currentId = Object.keys(ntStore.items)[0];
    ntCur = ntStore.items[ntStore.currentId];
    view.innerHTML = "";
    var wrap = el("div", "tool");
    wrap.innerHTML =
      '<div class="mm-bar">' +
        '<button class="btn accent" id="ntNew">＋ 新規メモ</button>' +
        '<button class="btn" id="ntDel">削除</button>' +
        '<button class="btn" id="ntCopy">コピー</button>' +
        '<span class="spacer"></span>' +
        '<span class="mm-hint" id="ntStatus">自動保存されます</span>' +
      '</div>' +
      '<div class="tool-body" style="padding:0"><div class="notes-wrap">' +
        '<div class="notes-list" id="ntList"></div>' +
        '<div class="notes-editor"><textarea id="ntArea" spellcheck="false" placeholder="ここに書く…"></textarea></div>' +
      '</div></div>';
    view.appendChild(wrap);
    ntRenderList();
    var area = document.getElementById("ntArea");
    area.value = ntCur.body || "";
    area.addEventListener("input", function () {
      ntCur.body = area.value; ntCur.updated = Date.now();
      var st = document.getElementById("ntStatus"); if (st) st.textContent = "保存中…";
      clearTimeout(ntTimer);
      ntTimer = setTimeout(function () {
        saveStore(NT_KEY, ntStore);
        var s = document.getElementById("ntStatus"); if (s) s.textContent = "保存しました";
        ntRenderList();
      }, 400);
    });
    document.getElementById("ntNew").addEventListener("click", ntNew);
    document.getElementById("ntDel").addEventListener("click", ntDelete);
    document.getElementById("ntCopy").addEventListener("click", function () {
      var a = document.getElementById("ntArea"); a.select();
      var ok = false; try { ok = document.execCommand("copy"); } catch (e) {}
      if (navigator.clipboard) { navigator.clipboard.writeText(a.value).then(function () {}, function () {}); ok = true; }
      toast(ok ? "コピーしました" : "手動でコピーしてください");
    });
  }
  function ntRenderList() {
    var list = document.getElementById("ntList"); if (!list) return;
    list.innerHTML = "";
    var keys = Object.keys(ntStore.items).sort(function (a, b) { return ntStore.items[b].updated - ntStore.items[a].updated; });
    keys.forEach(function (k) {
      var note = ntStore.items[k];
      var item = el("button", "note-item" + (k === ntStore.currentId ? " active" : ""));
      var snippet = (note.body || "").split("\n").slice(1).join(" ").trim() || "本文なし";
      var h = el("h4", null, ""); h.textContent = ntTitle(note);
      var p = el("p", null, ""); p.textContent = snippet;
      item.appendChild(h); item.appendChild(p);
      item.addEventListener("click", function () {
        ntStore.currentId = k; ntCur = note; saveStore(NT_KEY, ntStore);
        document.getElementById("ntArea").value = note.body || "";
        ntRenderList();
      });
      list.appendChild(item);
    });
  }
  function ntNew() {
    var id = "nt_" + Date.now().toString(36);
    ntStore.items[id] = { id: id, updated: Date.now(), body: "" };
    ntStore.currentId = id; ntCur = ntStore.items[id]; saveStore(NT_KEY, ntStore);
    document.getElementById("ntArea").value = ""; ntRenderList();
    document.getElementById("ntArea").focus();
  }
  function ntDelete() {
    if (Object.keys(ntStore.items).length <= 1) { toast("最後の1枚は消せません"); return; }
    if (!window.confirm("このメモを削除しますか？")) return;
    delete ntStore.items[ntCur.id];
    ntStore.currentId = Object.keys(ntStore.items)[0]; ntCur = ntStore.items[ntStore.currentId];
    saveStore(NT_KEY, ntStore);
    document.getElementById("ntArea").value = ntCur.body || ""; ntRenderList();
  }

  /* ============ 用語・略語メモ ============ */
  var GL_KEY = "mytools.glossary";
  var glStore;
  function glSeed() {
    return { entries: [
      { id: uid(), term: "CoNS", def: "コアグラーゼ陰性ブドウ球菌" },
      { id: uid(), term: "QC", def: "精度管理（Quality Control）" },
      { id: uid(), term: "TAT", def: "検査所要時間（Turn Around Time）" }
    ] };
  }
  function renderGlossary() {
    glStore = null;
    try { glStore = JSON.parse(localStorage.getItem(GL_KEY)); } catch (e) {}
    if (!glStore || !glStore.entries) { glStore = glSeed(); localStorage.setItem(GL_KEY, JSON.stringify(glStore)); }
    view.innerHTML = "";
    var wrap = el("div", "tool");
    wrap.innerHTML =
      '<div class="mm-bar">' +
        '<button class="btn accent" id="glAdd">＋ 用語を追加</button>' +
        '<span class="spacer"></span>' +
        '<span class="mm-hint">自分だけの略語辞典（検索で絞り込み）</span>' +
      '</div>' +
      '<div class="tool-body"><div class="gl-wrap">' +
        '<input class="gl-search" id="glSearch" type="text" placeholder="🔍 用語・意味で検索…">' +
        '<div class="gl-list" id="glList"></div>' +
      '</div></div>';
    view.appendChild(wrap);
    document.getElementById("glSearch").addEventListener("input", function (e) { glRenderList(e.target.value); });
    document.getElementById("glAdd").addEventListener("click", glAdd);
    glRenderList("");
  }
  function glSave() { localStorage.setItem(GL_KEY, JSON.stringify(glStore)); }
  function glRenderList(q) {
    var list = document.getElementById("glList"); if (!list) return;
    q = (q || "").toLowerCase().trim();
    list.innerHTML = "";
    var rows = glStore.entries.filter(function (en) {
      if (!q) return true;
      return (en.term + " " + en.def).toLowerCase().indexOf(q) !== -1;
    });
    if (!rows.length) {
      list.appendChild(el("div", "gl-empty", q ? "「" + q + "」に一致する用語はありません。" : "まだ用語がありません。「＋ 用語を追加」で登録してください。"));
      return;
    }
    rows.forEach(function (en) {
      var r = el("div", "gl-row");
      var term = el("span", "gl-term", ""); term.textContent = en.term;
      var def = el("span", "gl-def", ""); def.textContent = en.def;
      var acts = el("div", "gl-acts");
      var edit = el("button", "mini-btn", "✎"); edit.title = "編集";
      edit.addEventListener("click", function () {
        var t = window.prompt("用語（略語）", en.term); if (t == null) return;
        var d = window.prompt("意味", en.def); if (d == null) return;
        en.term = t.trim() || en.term; en.def = d.trim() || en.def; glSave();
        glRenderList(document.getElementById("glSearch").value);
      });
      var del = el("button", "mini-btn danger", "×"); del.title = "削除";
      del.addEventListener("click", function () {
        glStore.entries = glStore.entries.filter(function (x) { return x.id !== en.id; }); glSave();
        glRenderList(document.getElementById("glSearch").value);
      });
      acts.appendChild(edit); acts.appendChild(del);
      r.appendChild(term); r.appendChild(def); r.appendChild(acts);
      list.appendChild(r);
    });
  }
  function glAdd() {
    var t = window.prompt("用語（略語）を入力"); if (t == null) return;
    if (!t.trim()) { toast("用語を入力してください"); return; }
    var d = window.prompt("意味を入力", ""); if (d == null) d = "";
    glStore.entries.unshift({ id: uid(), term: t.trim(), def: d.trim() }); glSave();
    var s = document.getElementById("glSearch"); if (s) s.value = "";
    glRenderList("");
  }

  /* ============ モバイルナビ ============ */
  var app = document.getElementById("app");
  document.getElementById("menuToggle").addEventListener("click", function () { app.classList.toggle("nav-open"); });
  document.getElementById("scrim").addEventListener("click", function () { app.classList.remove("nav-open"); });
  function closeNavMobile() { app.classList.remove("nav-open"); }

  /* ============ 起動 ============ */
  buildNav();
  showHub();
})();
</script>
